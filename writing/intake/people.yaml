# yaml-language-server: $schema=https://json.schemastore.org/yamllint
# people.yaml — humans who shaped the 1976 world
#
# SCHEMA (per entry under `people:`)
#   id:            kebab-case, unique. Used for cross-refs. (required)
#   name:          their name as used in the game (required)
#   change_name:   true | false  — should I rename them in the game canon?
#   reality:       real | mixed | fake | parody  (required)
#   role:          one-line role tag — "mom", "best friend", "the bully", "weird neighbor", "shop teacher"
#   age_1976:      number or range like "40s"
#   relation:      relation to Danny (the player character)  — "mother", "schoolmate", "older kid on the block"
#   physical:      |  short physical sketch. hair, clothes, signature object. one or two lines.
#   voice:         |  how they talk. accent, catchphrases, vocabulary. one or two lines.
#   vibe:          |  the feel. funny, scary, sad, predatory, oblivious. one or two lines.
#   role_in_game:  how they function for the player — "gatekeeper for X", "ally", "obstacle", "comic relief", "vendor"
#   stories:       list of story IDs (from stories.yaml) they appear in
#   tags:          free-form list — ["family","authority","kind","dangerous-adult","kid"]
#   audience:      gen_x | gen_z | both
#   notes:         |  anything else. real-vs-fake notes, sensitivities, ideas for puzzles tied to them
#
# CATEGORIES — put entries under the right top-level key for browsing
#   family:        immediate family
#   friends:       Danny's peer group
#   neighborhood:  adults and kids on the block
#   school:        teachers, principals, fellow students
#   famous_local:  local-celebrity types — the cop everybody knows, the mean store owner
#   strangers:     one-off NPCs (the guy outside the liquor store, the carnie at Stomper's)
#
# ---------------------------------------------------------------

