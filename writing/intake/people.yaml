  - id: iwona-kowalski
    name: Iwona Kowalski
    change_name: false
    reality: mixed
    role: the love interest; the soul of the game
    age_1976: 16
    relation: Peter and Eva's daughter / Natan and Jacob's cousin / your future wife
    sketch: |
      Sixteen. Just arrived from Poland with her parents. Old enough
      to drive (the age bump from 15 → 16 was for exactly this).
      Eccentric. Ballroom dancer. Incredibly smart. Beautiful.
      Heavy accent, speaks little English at the start. The accent
      is intoxicating to Mark-in-Danny — he is gone the moment he
      hears her say his name wrong.

      Iwona has zero baseline for Danny, which is the entire
      cover-blowing solution: with Mom, Mickey, the block — Mark
      is performing Danny. With Iwona, Mark gets to be Mark, and
      Iwona just thinks that's who Danny is. She is the only safe
      space for him in 1976. That happens to be the place he falls
      in love. See `premise.md` for the full romance arc + locked
      thematic pillars (Shared Otherness, Soul Not Body).
    voice: |
      Polish accent. Quiet, observant. When she laughs she laughs
      with her whole face. Mangles idioms in ways that become
      personal jokes between her and Mark.
    role_in_game: |
      The romance is the emotional engine of the entire game.
      Cover-blowing risk: NONE (in the cover-blowing sense). The
      MOST EMOTIONALLY CONSEQUENTIAL relationship in the game.
    tags: [neighbor, love-interest, polish, dancer, brilliant, soulmate, LOCKED]
    audience: both
    notes: |
      Iwona is based on Mark's real wife of 30+ years (also named
      Iwona). She knows and is happy about her place in the game.
      All character details — mannerisms, signature objects, a
      phrase she mangles, what she loves, what she hates, her dance
      style, her first-kiss setting — are pending Mark's authoring.
      Treat with care. Mark's stated intent: "I want to fall in
      love with her again in this story."
    depth: sketch

