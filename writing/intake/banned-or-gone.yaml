# banned-or-gone.yaml — things that no longer exist or got pulled from market
#
# This is your "dangerous toys / banned vending machines" research goldmine.
#
# SCHEMA
#   id:            kebab-case (required)
#   name:          (required)
#   reality:       real | mixed
#   category:      toy | food | drug | vehicle | machine | substance | tech | service
#   description:   |  what it was, how it worked
#   how_it_hurt_people: |  the specific injury or risk
#   when_it_went_away:  rough year or era ("recalled 1977", "phased out late 80s", "still legal but socially extinct")
#   how_to_use_in_game: |  encounter, puzzle item, contraband, environmental detail
#   tags:          free-form
#   audience:      gen_x | gen_z | both
#   notes:         |
#
# ---------------------------------------------------------------

items:
  - id: lawn-darts
    name: Lawn Darts (Jarts)
    reality: real
    category: toy
    description: |
      Yard game. Heavy metal-tipped 12-inch darts you THREW UNDERHAND into a plastic ring on the lawn.
      Like horseshoes but with a 4-inch steel spike pointed at the sky on every landing.
    how_it_hurt_people: |
      Skewered children's skulls. Multiple deaths. CPSC banned them in 1988.
    when_it_went_away: Banned 1988. Still legal in 1976.
    how_to_use_in_game: |
      Every backyard has them in the shed. Set piece. Possibly puzzle: throw them to break a window from a distance?
      Possibly a "are you SURE you want to play this" comedy choice.
    tags: [toy, deadly, banned, backyard]
    audience: both
    notes: One of the all-time perfect "we did WHAT?" gags.

  - id: clackers
    name: Clackers / Klick-Klacks
    reality: real
    category: toy
    description: |
      Two acrylic balls on a string. You held the middle ring and pumped your hand up and down
      until the balls clacked together at top and bottom. Made an EAR-SPLITTING sound.
    how_it_hurt_people: |
      Balls shattered on impact, sending acrylic shrapnel into kids' faces. Wrists got destroyed.
      Pulled from market mid-70s after lawsuits.
    when_it_went_away: Original recalled ~1976. Right inside our game window.
    how_to_use_in_game: |
      Maybe the cool-but-broken thing the older kid has. Maybe a "use to make loud noise" puzzle item.
    tags: [toy, banned-in-game-window, noisemaker]
    audience: both

  - id: cigarette-vending-machine
    name: Cigarette Vending Machine
    reality: real
    category: machine
    description: |
      Coin-op cigarette dispenser in every bar, bowling alley, gas station, diner.
      75¢. Pull a knob, pack drops out. Pack of matches included free. ZERO ID check.
    how_it_hurt_people: |
      Kids bought cigarettes. That's the whole thing. They were everywhere.
    when_it_went_away: Mostly gone by mid-90s after the 1992 federal restrictions. A few hung on into the 2000s.
    how_to_use_in_game: |
      Bowling alley puzzle item. Source of cigarettes for currency/trade. Possibly part of a heist
      (jam the mechanism with a slug, get a free pack).
    tags: [machine, contraband-source, mark-research]
    audience: both

