# media.yaml — TV shows, movies, music, books, magazines, comics, games
#
# SCHEMA
#   id:            kebab-case (required)
#   name:          in-game (parody) name (required)
#   real_name:     IRL name
#   change_name:   true | false
#   reality:       parody | real (real only if it's something we can legally reference — public-domain or generic)
#   medium:        tv | movie | song | album | band | book | magazine | comic | game | radio_show
#   year:          when it dropped IRL (or our parody version)
#   description:   |  what it is, why it mattered, the joke if any
#   in_world_use: |  how the player encounters it — poster on wall, song on radio, item to acquire, conversation topic
#   currency_value: optional — if it's tradeable
#   tags:          free-form
#   audience:      gen_x | gen_z | both
#   notes:         |
#
# CATEGORIES
#   tv
#   movies
#   music_bands
#   music_songs
#   magazines
#   comics
#   books
#   games
#   radio
#
# ---------------------------------------------------------------

