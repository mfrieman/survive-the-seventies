destinations:
  - id: storybook-hollow
    name: Storybook Hollow
    change_name: false
    reality: parody
    zone: destination
    decor_style: cheap-regional-amusement-park-1976
    hours: |
      Daytime — open Memorial Day through Labor Day, weekends + select
      weekdays, gates close at dusk. After dusk it is locked but very
      lockable-from-outside, not lockable-from-inside, if you know what
      I mean.
    danger_level: dangerous
    description: |
      The cheap regional storybook-theme park forty-five minutes west of
      Old Bay County, off Route 40. Parody of Maryland's real Enchanted
      Forest. Sun-faded plywood castle gate painted that specific 1956
      shade of "we used whatever was on sale." Smells like hot tar,
      popcorn, pond water, and the kind of warm rubber that only old
      amusement parks smell like. Cicadas at all times. A loudspeaker
      pole near the snack bar plays scratchy nursery-rhyme music on a
      loop that has been on a loop since 1961.

      Two completely different places depending on the hour:

      DAYTIME: screaming kids, popcorn, the antique cars smashing into
      each other, mothers smoking on benches. The horror is the
      safety-failures-in-broad-daylight comedy.

      NIGHTTIME (after the gates close): pitch dark except for one
      service light by the snack bar. The painted dwarves and Willie
      the Whale and the dead-eyed deer in the petting zoo become
      genuinely uncanny. The block knows three ways in through the
      back fence.
    layout: |
      Front gate is the white plywood castle wall with two crenellated
      towers. Inside, a curving asphalt path wanders past the storybook
      cottages (Snow Princess, Cinder Girl, Old Woman in the Shoe, Red
      Cape, Goldie & the Bears, Hickory Dock, Miss Muffet, Boy Blue,
      Easter Bunny House, Robin the Sailor's island, the giant teapot).
      Path opens onto the central pond (tugboat dock + manmade
      slide-mountain). Rides are scattered on the perimeter: the
      Antique Cars, the Mother Goose Pumpkin Coach, the Teacup Train,
      Jungle Land tram, the moon bounce, the petting zoo. Willie the
      Whale sits at the far north end of the pond — climb in through
      his mouth.

      Back fence runs along a strip of woods. Three known hop-spots,
      one with a known cut. Service road on the far side loops to a
      gravel maintenance yard.
    key_features:
      # Daytime rides + exhibits — every one is a vignette
      - "The Front Gate Castle: white plywood, two flag poles, one with a flag, one without"
      - "Antique Car Ride: real gas-powered, no center barrier, kids smash into walls and each other, no seatbelts"
      - "Little Teapot Tugboat: open boat, no life jackets, slow circle of the pond, docks at the slide-mountain"
      - "The Slide Mountain: long metal slide painted to look like rock — temperature of a frying pan in July"
      - "Mother Goose Pumpkin Coach: front car shaped like a team of mice pulling a pumpkin carriage, runs fast through a concrete trough with shallow water, ends at the castle interior with the famous bars"
      - "The Castle Interior (end of Mother Goose ride): concrete-block walls, metal bars for windows. Kids regularly get stuck in the bars. AUTOBIOGRAPHICAL — Mark got stuck here as a kid."
      - "Jungle Land Tram: truck pulling two open trailers, fast over hills, cement-cast jungle animals"
      - "The Teacup Train: train of teacups on tracks, with plain benches between them, no bars, no belts, surprisingly fast"
      - "The Moon Bounce: filthy, a black sheen on every surface, never cleaned"
      - "Petting Zoo: includes deer. Deer are bad petting-zoo animals."
      - "Playgrounds: scattered 1970s 'death metal' playgrounds — bare metal slides, see-saws over concrete, the kind of monkey bars that punished you"
      - "Willie the Whale: massive painted plaster whale with a mouth you climb into. Famously a stuck-kid hotspot. The most iconic thing in the park."
      - "The Storybook Cottages: tiny plywood houses for each fairy tale. Half the figures are missing eyes. The dwarves' paint job has aged into something disturbing."
      - "The Snack Bar: cotton candy, snow cones, hot dogs that have been on the roller since June"
      # Night-mode features
      - "Back Fence Cut (NIGHT): chain-link with a slit at knee height, well-known to the block kids"
      - "The Maintenance Yard (NIGHT): gravel lot behind the petting zoo where the rent-a-cop parks his Pinto"
      - "The Rent-a-Cop's Patrol Loop (NIGHT): slow walk around the perimeter with a flashlight, takes ~12 minutes per circuit"
      - "The Tugboat Pond (NIGHT): unsupervised; ladders to the tugboat are still down; the manmade mountain catches moonlight"
      - "The Mother Goose Pumpkin (NIGHT): still parked in its bay, climbable, perfect for a stupid photo or a stupid first kiss"
