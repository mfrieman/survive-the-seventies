    tags: [destination, period-piece, two-modes, kids-and-teens, set-piece, parody]
    notes: |
      DESIGN — TWO MODES:
      1. Daytime "Watch Your Brother" mode. Mom dumps Danny + Bobby at
         the front gate with $5 and a 4 PM pickup. Bobby is in heaven.
         Danny is suffering. Possible structure: each ride is a
         vignette / micro-encounter with its own skill check. Centerpiece
         bit is Bobby getting stuck in the castle bars at the end of
         the Mother Goose ride — the autobiographical beat.
      2. Nighttime "Break-In" mode. Park is locked. Block kids know the
         fence cut. Sneak past the rent-a-cop's flashlight loop, dare
         each other onto the tugboat / into Willie's mouth / down the
         metal slide. Endgame: get spotted, scatter through the back
         woods, regroup at the creek. (Danny's choice to go vs. stay
         home with the Book is meaningful — quest mechanics TBD when
         we design quests proper.)

      Bobby's pull as a recurring driver: he wants to go BACK. Repeat
      visits unlock new ride disasters.

      PARODY / IP NOTE: every storybook character is just slightly off
      the licensed property. Snow Princess (not Snow White) and her
      seven generic short men. Cinder Girl (not Cinderella). The
      narrator lampshades it. ("Whoever painted the dwarves was sued
      by a major studio in 1958 and lost.")

    depth: deep

