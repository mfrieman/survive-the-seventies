# yaml-language-server: $schema=https://json.schemastore.org/yamllint
# places.yaml — locations in the 1976 world
#
# SCHEMA (per entry under each category)
#   id:            kebab-case, unique. (required)
#   name:          in-game name (required)
#   change_name:   true | false
#   reality:       real | mixed | fake | parody  (required)
#   zone:          house | block | town | destination
#   subzone:       optional — for big places ("ocean-side / boardwalk", "stompers / midway")
#   decor_style:   optional — references an ID from writing/house-decor-catalog.md
#                  for households. Multiple places in one house should share the
#                  same decor_style (e.g. the upstairs and the basement of one
#                  family inherit one style). Sometimes the joke is that the
#                  style is preserved but the condition is opposite.
#   description:   |  what it looks/smells/sounds like. 2-5 lines. Sensory.
#   layout:        |  rough layout — what's where. helps me build the Ren'Py screen.
#   key_features:  list of bullet things players can interact with
#     - rusted ice machine outside (drop chrome cap to unlock)
#     - pay phone next to bathrooms (one of three working phones in town)
#   inhabitants:   list of people IDs you'd find there
#   tied_to_part:  optional — if a machine part lives here, name it ("flyback transformer")
#   tied_to_favor: optional — if a long-con favor happens here
#   hours:         "always open" | "weekends only" | "after dark" | specific
#   danger_level:  safe | mild | sketchy | dangerous | will-get-you-killed
#   tags:          free-form
#   audience:      gen_x | gen_z | both
#   notes:         |  anything else
#
# CATEGORIES
#   house:         the Marek house (rooms)
#   block:         Linden Drive and immediately adjacent
#   town:          Old Bay County core — downtown, the strip, the school, etc.
#   destinations:  trips — Storybook Hollow, Ocean Side, Chocolatetown, Glen Hollow
#
# ---------------------------------------------------------------

house:
  - id: dannys-bedroom
    name: Danny's Bedroom
    change_name: false
    reality: mixed
    zone: house
    subzone: marek-house
    decor_style: bedroom-rocker   # kid-bedroom override; house bones still show through
    description: |
      The wood-paneling-and-shag-carpet bones of the Marek house show
      through wherever the posters don't reach — same harvest-gold shag
      as the upstairs hall, same dark-walnut paneling. But the walls are
      Danny's. KISS BLAZE poster over the bed (parody Kiss; foil
      lettering catching the lamp light). An Aerosmith Rocks album cover
      thumbtacked to the closet door. A folded-out Creem magazine
      centerfold of Mickey's guitar hero. A peace sign in Sharpie on
      the back of the door from when Danny was eleven and thought it
      was deep.

      Twin bed with a brown plaid bedspread that has been worn smooth
      and is two washes from being a rag. Clock radio on the nightstand
      permanently set to WBAY-FM. A dresser with a fish tank on top —
      hasn't held fish in a year; Danny uses it for electronics parts
      that don't fit in the basement workbench. A guitar in the corner
      he doesn't really play (he tells Mickey he does).

      The room smells like Old Spice he started wearing six months ago,
      sneakers, and a damp towel he forgot to hang up. The clock radio
      is on at all hours.
    layout: |
      Door (east) to upstairs hallway. Window (north) to backyard —
      overlooks Kay's fenced garden and the alley gate. Bed against
      west wall, head under the KISS BLAZE poster. Desk under the
      window with the Book, an open issue of MAD, and a partially
      disassembled clock radio. Dresser on the east wall with the fish
      tank (parts) on top. Closet (south) — the guitar, board games,
      hidden notebook taped under the top shelf.
    key_features:
      - The Book (always on the desk; primary mid-Act-2 communication channel)
      - The closet — hidden notebook taped under the top shelf
      - The fish tank — parts storage, real puzzle inventory
      - Under the bed — wooden box (the swap crystal lives here in 2027 too)
      - The KISS BLAZE poster (recurring scene-set; foil catches lamp light)
      - The clock radio (always on; WBAY-FM scene-set)
      - The guitar (lie maintenance — Mickey thinks Danny plays it)
      - The window to the backyard / alley (visual line on the alley gate)
    inhabitants: [danny-marek]
    related_places: [marek-house]
    hours: always
    danger_level: safe
    tags: [bedroom, protagonist-room, rocker, kid-sovereign-territory]
    audience: both
    notes: |
      DESIGN NOTE — Where the player wakes up. The first room of the game.
      Danny's bedroom is a `bedroom-rocker` per the kid-bedroom rule in
      the decor catalog. The Marek house's colonial-american-bicentennial
      bones (wood paneling, shag carpet) still show through, but the
      walls, the music, and the air belong to Danny.

  # ---- The Marek house — 1437 Linden Drive ----
  # Danny's home. Where the swap happened. Where the player wakes up.

  - id: marek-house
    name: The Marek House
    change_name: true
    reality: mixed
    zone: house
    decor_style: colonial-american-bicentennial
    description: |
      A modest two-story rowhouse-style place on Linden Drive. Aluminum
      siding, a small front porch with a wrought-iron railing Kay made
      Dennis paint white in '74, two concrete steps to the sidewalk. A
      fenced backyard with a gate to the alley — you can park a car back
      there, and Dennis sometimes does when he's brought home job-site
      scraps.

      Inside, the house commits all the way to its bit: COLONIAL AMERICAN
      BICENTENNIAL, 1976 edition. Eagle on the wall. Wagon-wheel chandelier
      in the dining room. The big floral-and-plaid wingback "parlor set"
      anchors the living room — exposed maple frame, knotty-pine accents,
      harvest-gold and burnt-orange palette, the kind of couch you can
      hear sit down. A framed cross-stitch of the Liberty Bell. A bald
      eagle decanter on top of the console TV that hasn't held a drop in
      a decade (Kay doesn't drink, Dennis drinks beer not bourbon).

      The living room is dominated by two pieces of furniture-grade
      electronics. First: the console TV, a 1968 Magnavox monster with
      vacuum tubes and a click-wheel dial — UHF and VHF, five channels
      that come in clear, two more that come in if it's foggy. It takes
      45 seconds to warm up and another 30 to cool down. Second: the
      Precedent Stereophonic Recordergram — a high-gloss maple cabinet
      from the early '60s with a four-speed Garrard turntable, a valve
      amplifier with AM radio, and a BSR three-speed reel-to-reel. Gold
      thread speaker fabric. Kay's altar. The Motown lives here. Loud.

      The kitchen has one of those 1970s Harvest Gold refrigerators that
      weighs eight hundred pounds and could survive a direct artillery
      hit, and a matching gas stove that looks like an APC. Linoleum
      floor in a fake-brick pattern. A Formica dinette set under the
      window. A wall-mounted black rotary phone with a cord that reaches
      the basement.

      Smell: Kool 100s, brewed coffee, joint compound (Dennis's clothes
      live here), and whatever Kay's cooking — which, unlike Athena
      Karras, Kay actually does cook, and pretty well.

      Sound: the stereo (Motown), the TV (something Dennis put on),
      Kay's voice cutting through both.
    layout: |
      Front door → small foyer → living room (left) with the parlor set
      facing the console TV and the Precedent stereo against the long
      wall. Dining room (straight ahead) with the wagon-wheel chandelier,
      heavy maple table that seats six, hutch full of Bicentennial
      commemorative plates Kay actually uses. Kitchen (off the dining
      room) with the tank fridge, the tank stove, the dinette, the
      back door to the yard. Upstairs: three bedrooms (Kay & Dennis,
      Danny, Bobby) and one bathroom shared by everyone, which is its
      own running headache. Basement: Dennis's tool corner, a chest
      freezer, the washer/dryer, and the long workbench where Danny
      built the machine and where the broken pieces still sit under a
      tarp.
    key_features:
      - The Precedent Stereophonic Recordergram (Kay's altar; the Motown lives here)
      - The console Magnavox TV (warm-up gag; click-wheel dial; "fix the rabbit ears")
      - Dennis's recliner (the throne; do not sit in it when Dennis is home)
      - The wagon-wheel chandelier in the dining room (era-perfect; great visual)
      - The harvest-gold tank fridge (puzzle potential — what's in the freezer)
      - The Bicentennial wall display (eagle, Liberty Bell cross-stitch, commemorative plates)
      - The wall phone in the kitchen (one of the household's main player tools)
      - Danny's bedroom (see: dannys-bedroom — separate entry)
      - The basement workbench (where the time machine was built and broken)
      - The fenced backyard with alley gate (can park a car; main stealth route)
    inhabitants: [kay-marek, dennis-marek, danny-marek, bobby-marek]
    related_places: [dannys-bedroom]
    hours: always
    danger_level: safe
    tags: [protagonist-home, family-home, bicentennial, motown-loud]
    audience: both
    notes: |
      DESIGN NOTE 1 — Stereo importance: The Precedent is a character.
      Kay has the Motown on most of the day; the player can hear what's
      playing as a scene-setter and Kay's mood barometer. A specific
      song queued can foreshadow scenes.

      DESIGN NOTE 2 — TV warm-up gag: The 45-second warm-up is a real
      thing about 1968 tube TVs and a useful comedy beat — Dennis turns
      it on, sits down, the screen finally appears just as he's said
      something Kay can yell at him about.

      DESIGN NOTE 3 — Basement is a workshop, not a hangout. Counterpoint
      to the Karras Dungeon: the Marek basement is utilitarian, Dennis's
      domain, where the broken time machine lives. It is NOT a party
      space. (Future split into its own entry when needed.)

      DESIGN NOTE 4 — The alley gate is the player's friend. Stealth
      ingress/egress that bypasses Kay in the kitchen. Mirrors the
      Karras Dungeon's roll-up door — both important homes have an
      alley-side back-door route.
    depth: sketch

block:

  # ---- The Karras house and basement ----
  # 5 houses down from the Mareks. Home of the Karras family.

  - id: karras-house
    name: The Karras House
    change_name: true
    reality: mixed
    zone: block
    decor_style: greek-orthodox-maximalist
    description: |
      Five houses down the block from the Mareks. From the street: tidy
      split-level, flowering shrubs along the front walk, a sports car
      glinting in the driveway (Costas "Gus"'s one indulgence). The garden out
      back is Athena's pride — neat beds of zinnias, marigolds, and tomatoes —
      and the daily battle line between Athena and Shadow the black lab, who
      digs up flowers and drags dirt into the kitchen. Athena scolds him and
      loves him in the same sentence; secretly she doesn't mind because his
      messes give her something to clean, and cleaning is what Athena does.

      The interior is "greek-orthodox-maximalist" turned up to 11:
      crucifix in every room, floral burgundy-and-gold sofa under plastic
      slipcovers, doilies on every surface, harvest-gold carpet, Last Supper
      print over the dining table, frankincense ghost from Easter. Spotless.
      Vacuumed daily. The plastic slipcovers squeak.

      The garage is a different country. (See: the-dungeon.)
    layout: |
      Front door → foyer with crucifix and a small font of holy water.
      Living room (where the GOOD floral sofa lives, on plastic, never sat on,
      Costas "Gus"'s recliner the one allowed exception). Dining room (used twice
      a year). Kitchen (Athena's lab — Magnavox TV on the counter showing Julia
      Child, garlic in the air, something on the stove that's going to be bad).
      Stairs UP to bedrooms. Back door off the kitchen opens onto a short
      concrete path across the back yard to the detached garage — The Dungeon.
      Athena does not walk that path.
    key_features:
      - Costas "Gus"'s recliner (he's in it most evenings, beer in hand, TV on)
      - Athena's kitchen (whatever's cooking is bad; you must say it's good)
      - The plastic-slipcovered living-room couch (NEVER sit here)
      - Athena's garden (Shadow digs it up; she scolds him; nothing changes)
      - The sports car in the driveway (Demi tries to borrow it; rarely succeeds)
      - Detached garage out back (Athena does not go in there)
    inhabitants: [gus-karras, athena-karras, dimitri-karras, mickey-karras]
    related_places: [the-dungeon]
    hours: always
    danger_level: safe
    tags: [neighborhood, family-home, two-cultures, mediterranean-catholic]
    audience: both
    notes: |
      Shadow the black lab is the household's third character. Mostly outdoor
      dog, frequent indoor visitor with muddy paws. Friendly. Loves the kids.
      Has never been into the Dungeon.
    depth: sketch

  - id: the-dungeon
    name: The Dungeon
    change_name: false   # the nickname IS the joke; keep it
    reality: mixed
    zone: block
    subzone: karras-house
    decor_style: greek-orthodox-maximalist   # SAME stereotype — that's the joke. See notes.
    description: |
      The detached single-car garage behind the Karras house, rechristened
      by the kids who actually live in it. Costas "Gus" parked here exactly
      once, in 1968. The car has lived in the driveway ever since.

      Concrete floor, oil-stained from the Olds that used to live here.
      Bare studs and pink-fiberglass insulation on the long walls; the
      back wall is finished in cheap wood paneling Demi and Mickey nailed
      up themselves one weekend. A single bare bulb on a pull-chain in
      the center of the ceiling. Two small high windows on the side wall,
      taped over with cardboard that says "STUDIO." A clip-on fan that
      makes everything louder without making anything cooler.

      The "stage" fills the back wall: Mickey's BOMBARD Mark IV amp
      stacks tower floor-to-ceiling like cathedral organ pipes — they're
      why the kids could never have set up in the basement; the ceiling
      down there was too low. Demi's drum kit faces the amps, a Ludwig
      knockoff with a kick head Demi sharpie'd "KARRAS" across in capital
      letters. A bass amp Mickey isn't allowed to touch. A wall of milk
      crates stuffed with records (Zeppelin, Sabbath, AC/DC, plus their
      parody equivalents).

      The furniture is the SAME furniture you'd find upstairs in 1965 —
      the original Karras living-room set, the burgundy-and-gold floral
      couch and its matching wingback chair, the marble-top end tables,
      the crocheted antimacassars. Athena exiled the whole set out here
      ten years ago when she redecorated. It has been the canvas for a
      decade of teenagers ever since: cigarette burns shaped like
      constellations across the cushions, beer rings on the marble, an
      unreadable stain on the antimacassar that nobody will discuss, a
      Theotokos prayer candle on the end table burning beside a Slurpee
      cup of warm beer.

      The Saint Nicholas icon Athena hung when they moved the couch out
      here? Still on the wall. Now with a Sabbath poster taped over half
      of it.

      Smell: Marlboro Reds, spilled beer, weed, sweat, motor oil ghost
      from the concrete, and — faintly, in one corner — used condoms.
      Beer cans pyramid-stacked against the wall. The indoor-outdoor
      carpet remnant Demi dragged in from someone's curb is so destroyed
      it has its own ecology.

      Athena believes this is where her boys "practice their music." She
      has not personally crossed the back yard to the garage in years.
    layout: |
      Single-car detached garage. Roll-up garage door on the south wall —
      faces the side yard / alley and is the primary in/out for the band
      and any visitor who knows the score. A standard side door on the
      west wall — faces the back yard and the Karras kitchen window;
      this is the door Athena could see, so nobody uses it. The "stage"
      (amp wall, Demi's kit, bass amp) fills the north wall. The floral
      couch and wingback face it from the south, near the garage door.
      The condom corner is the northeast, behind a stack of broken
      speakers no one will move.

      IMPORTANT: the roll-up garage door means people can come and go
      from the alley without ever crossing the Karras back yard or being
      visible from any window in the house. This is the player's main
      ingress/egress.
    key_features:
      - The BOMBARD Mark IV amp wall (parody Marshall; Gus's money, Mickey's altar)
      - Demi's drum kit (Ludwig knockoff, "KARRAS" sharpied on the kick)
      - The 1965 Karras living-room set, defiled (couch, wingback, end tables, antimacassars)
      - The record crate (Zeppelin, Sabbath, AC/DC + parody equivalents)
      - The pyramid of beer cans (height tells time)
      - The defaced Saint Nicholas icon (Sabbath poster overlay)
      - The condom corner (do not investigate)
      - The roll-up garage door / alley escape route (key for player ingress/egress)
      - The "STUDIO" cardboard window-covers
      - The destroyed indoor-outdoor carpet
    inhabitants: [mickey-karras]   # Mickey is location-locked here
    related_places: [karras-house]
    hours: "afternoons through late night when Mickey's home from school"
    danger_level: mild
    tags: [hangout, music, contraband, location-locked-character, recurring-scene, decor-defiled, garage-band]
    audience: both
    notes: |
      DESIGN NOTE 1 — Same stereotype, opposite condition: The Dungeon is
      decor_style: greek-orthodox-maximalist on purpose. The
      furniture IS the upstairs set, ten years and a thousand cigarettes
      later. This is the central visual joke of the location. Do NOT
      redecorate it as some other style.

      DESIGN NOTE 2 — Mickey is location-locked to The Dungeon. All Mickey
      scenes happen here. The alley-facing garage door means the player
      doesn't need Athena-clearance to enter.

      DESIGN NOTE 3 — Garage band, not basement band. The relocation is
      thematic: garage bands are the staple. The Dungeon nickname predates
      the move; the kids kept calling it that after the couch came out
      here. The joke is now "this is a garage that thinks it's a basement."

      Candidate for puzzle ingredients: records, BOMBARD amp gear
      (electronics ~ machine parts?), contraband supply chain, older-kid
      gossip about the Catholic-school world Danny doesn't know.
      Possible long-con favor location.
    depth: sketch

  # ---- The Kowalski house — packed Polish household ----
  # Home of the Kowalski family. Eight people under one roof:
  # Jack, Mary, Natan, Jacob, Maggie, Peter, Eva, Iwona. Brick
  # rowhouse shell, Scandinavian Modern interior, European front
  # garden. Possible placement: next door to or across from the
  # Mareks (TBD). All Kowalski entries: `people.yaml > neighborhood`.

  - id: kowalski-house
    name: The Kowalski House
    change_name: false
    reality: mixed
    zone: block
    decor_style: scandinavian-modern-european-overlay
    description: |
      A brick rowhouse on Linden Drive — identical bones to every
      other house on the block, completely different inside. From
      the street: tidy, *too* tidy. The front yard is a small
      European-style garden — boxwood hedges instead of azaleas,
      a stone planter with geraniums, and a tiny gravel path
      bordered by white-painted bricks half-buried at an angle.
      It looks like someone transplanted a corner of Kraków onto
      a Maryland sidewalk. The neighbors think it's "interesting."

      Smells like wood polish, fresh bread, instant coffee, and
      faintly of pierogi from Maggie's eternal pot. There is always
      music somewhere in the house — Peter playing accordion in
      the back room, Natan's record player in the upstairs bedroom,
      the kitchen radio tuned to a Polish-language AM station only
      Mary listens to. Loud voices. Polish phrases threaded through
      English sentences. Eight people, one bathroom upstairs, one
      half-bath downstairs — it is always a little chaotic.
    layout: |
      ENTRY: small foyer with a tiled floor, a coat rack stacked
      with too many coats, and a console table holding mail Mary
      hasn't gotten to.

      LEFT: the FRONT SITTING ROOM — kept perfectly clean, off-
      limits to children, used four times a year for parties.
      Marimekko-print curtains, a low Danish-teak coffee table, a
      pristine white sofa with linen throws no one is allowed to
      move. A framed cross-stitched landscape of the Tatra Mountains
      on the wall. The room smells like furniture polish. It is
      the cleanest room on the block.

      RIGHT: the LIVING ROOM where the family actually lives.
      Television. Recliner (Jack's). Pile of National Geographics.
      Peter's accordion case leaning against the wall. Maggie's
      armchair angled toward the front window so she can watch
      the street.

      BACK: the KITCHEN — the heart of the house. Tile floor,
      formica table for eight (when chairs are dragged in from
      other rooms). One pot of something always on the stove.
      Mary's recipe books open on the counter, half of them in
      Polish, half in English. The Polish-language AM radio lives
      on top of the fridge.

      UPSTAIRS: four bedrooms. Jack & Mary's. Natan's (clothes
      racks, fabric swatches, a sewing machine, a record player).
      Jacob's (books, a chemistry set, dark posters). Iwona's
      (TBD — Mark to detail; reference `bedroom-girl-disco` or
      her own custom variant). Maggie has the small back bedroom
      downstairs (couldn't manage the stairs anymore).

      BASEMENT: half-finished. Workshop area with Peter's tools
      and easel + Jack's electrician supplies in metal cabinets.
      The other half is open — possibly the dance-lesson space
      from the locked-pending first-kiss scene (see `premise.md`).

      BACKYARD: small, fenced. Eva has started a vegetable garden.
      A clothesline. An alley behind.
    key_features:
      - "The front sitting room — off-limits, perfect, four parties a year. Comedy of restraint."
      - "Maggie's chair angled at the front window — she watches everyone on the block, names them all wrong, loves them all."
      - "Peter's accordion case — leans on the living-room wall; he picks it up without warning."
      - "The Polish-language AM radio on top of the fridge — Mary's morning ritual."
      - "Eight coats on a four-coat rack in the foyer — always in danger of collapse."
      - "The basement workshop — Peter's easel and Jack's electrician supplies. Possible parts source for Danny's machine."
      - "The basement dance space (the other half) — possible first-kiss location (see premise.md)."
      - "European front garden — boxwoods, geraniums, gravel path. Visually distinct from every other house on Linden."
      - "Iwona's bedroom window — visible from a specific spot on Linden, possibly from the Marek house roof."
    inhabitants:
      - jack-kowalski
      - mary-kowalski
      - natan-kowalski
      - jacob-kowalski
      - maggie-kowalski
      - peter-kowalski
      - eva-kowalski
      - iwona-kowalski
    hours: always open (it's a home)
    danger_level: safe
    tags: [house, neighbor, polish, romance-arc, packed-household, party-house-potential]
    audience: both
    notes: |
      DESIGN — this house is the gateway to Iwona. The mechanics
      of "getting invited in" matter: it's not Mickey's garage where
      you walk through the side door. The Kowalski house has rules.
      Mary's rules. Take your shoes off. Compliment the kitchen.
      Say hello to Maggie. Don't run.

      FUTURE — the packed-household setup is deliberate. When we
      get to scene design, the "crazy Polish family party" scene
      lives here: eight people plus extended family plus neighbors,
      accordion, vodka, food on every flat surface, Maggie calling
      everyone the wrong name with affection.

      OPEN — exact placement on Linden (next door / across from /
      two doors down from the Mareks) is TBD.
    depth: deep

  # ---- Future entries to consider ----
  #   - 1437 Linden Drive (the Marek house, exterior)
